services:
  tubedigest:
    build: .
    container_name: tubedigest
    restart: unless-stopped
    ports:
      - "${PORT:-5555}:5555"
    volumes:
      - .:/app
      - ${TRANSCRIPTIONS_DIR:-./Transcriptions}:${TRANSCRIPTIONS_DIR:-/app/Transcriptions}
      - ${SUMMARIES_DIR:-./Summaries}:${SUMMARIES_DIR:-/app/Summaries}
      - whisper-cache:/home/.cache/whisper
      - ytdlp-usage:/home/.local/share/tubedigest
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - RUNNING_IN_DOCKER=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_PROXY_URL=http://host.docker.internal:9100
      - XDG_CACHE_HOME=/home/.cache
      - XDG_DATA_HOME=/home/.local/share
      - PORT=${PORT:-5555}
      - TRANSCRIPTIONS_DIR=${TRANSCRIPTIONS_DIR:-/app/Transcriptions}
      - SUMMARIES_DIR=${SUMMARIES_DIR:-/app/Summaries}
      - HOST_TRANSCRIPTIONS_DIR=${TRANSCRIPTIONS_DIR:-./Transcriptions}
      - HOST_SUMMARIES_DIR=${SUMMARIES_DIR:-./Summaries}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  whisper-cache:
  ytdlp-usage:
