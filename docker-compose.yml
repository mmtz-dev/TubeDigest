services:
  tubedigest:
    build: .
    container_name: tubedigest
    restart: unless-stopped
    ports:
      - "${PORT:-5555}:5555"
    volumes:
      - .:/app
      - ${TRANSCRIPTIONS_DIR:-./Transcriptions}:/app/Transcriptions
      - ${SUMMARIES_DIR:-./Summaries}:/app/Summaries
      - whisper-cache:/home/.cache/whisper
    environment:
      - RUNNING_IN_DOCKER=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - XDG_CACHE_HOME=/home/.cache
      - PORT=${PORT:-5555}
      - HOST_TRANSCRIPTIONS_DIR=${TRANSCRIPTIONS_DIR:-./Transcriptions}
      - HOST_SUMMARIES_DIR=${SUMMARIES_DIR:-./Summaries}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  whisper-cache:
