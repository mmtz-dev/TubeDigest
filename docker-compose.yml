services:
  tubedigest:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5000:5000"
    volumes:
      - ./Transcriptions:/app/Transcriptions
      - ./Summaries:/app/Summaries
      - whisper-cache:/home/.cache/whisper
    environment:
      - RUNNING_IN_DOCKER=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - XDG_CACHE_HOME=/home/.cache

volumes:
  whisper-cache:
