services:
  tubedigest:
    build: .
    container_name: tubedigest
    restart: unless-stopped
    ports:
      - "${PORT:-5555}:5555"
    volumes:
      - ./Transcriptions:/app/Transcriptions
      - ./Summaries:/app/Summaries
      - whisper-cache:/home/.cache/whisper
    environment:
      - RUNNING_IN_DOCKER=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - XDG_CACHE_HOME=/home/.cache
      - PORT=${PORT:-5555}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  whisper-cache:
