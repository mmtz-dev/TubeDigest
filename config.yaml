transcription:
  # Video backend priority for metadata, subtitles, audio download, and playlists.
  # Each backend is tried in order; falls back to the next on failure.
  # Options: pytubefix, ytdlp
  video_backend: [pytubefix, ytdlp]

  short_max_minutes: 10
  mid_max_minutes: 20

  # Method chains per duration tier (tried in order, falls back on failure)
  short_methods: [whisper]
  mid_methods: [pytubefix_subtitles, youtube_transcript_api, whisper]
  long_methods: [youtube_transcript_api, pytubefix_subtitles, whisper]

  # Daily usage tracking: if youtube-transcript-api has been used fewer than
  # this many times in the last 24h, skip duration routing and use it first
  # (with normal fallback). Once the limit is hit, switch to duration-based routing.
  yt_api_daily_limit: 10

  # Daily yt-dlp usage cap (machine-wide). yt-dlp is only used as a fallback
  # when pytubefix fails. Once the limit is reached, yt-dlp calls are blocked
  # to avoid IP bans from YouTube.
  ytdlp_daily_limit: 50

  whisper_enabled: true
  whisper_model: "base"           # tiny | base | small | medium | large
  whisper_device: "auto"          # auto (GPU if available, else CPU) | cuda | cpu
  subtitle_langs: [en, en-US, en-GB]

categorization:
  # Automatically categorize transcripts/summaries into subfolders after summarization.
  # The AI reads the summary, picks or creates a category, and moves files accordingly.
  enabled: true

summarization:
  # Provider priority order (tried in order, falls back on failure)
  providers: [claude_cli, claude_proxy, gemini, ollama]

  gemini_model: "gemini-2.0-flash"

  ollama_model: "llama3.1"
  ollama_url: "http://localhost:11434"

  claude_proxy_url: "http://host.docker.internal:9100"

  prompt: >
    Summarize the following YouTube video transcript concisely.
    Highlight the main topics, key points, and any conclusions or
    takeaways. Use clear headings and bullet points where appropriate.
